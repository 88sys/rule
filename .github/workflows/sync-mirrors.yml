name: Sync Mirror Repositories
on:
  schedule:
    # 北京时间 07:20 (UTC 前日 23:20) 和 19:20 (UTC 11:20)
    - cron: '20 11,23 * * *'
  workflow_dispatch: 

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync-mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 1. 显示运行信息
        run: |
          echo "=== 镜像同步任务启动 ==="
          echo "触发方式: ${{ github.event_name }}"
          echo "运行ID: ${{ github.run_id }}"
          echo "UTC时间: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "北京时间: $(date -u '+%Y-%m-%d %H:%M:%S' -d '+8 hours')"

      - name: 2. 设置SSH密钥对
        run: |
          echo "配置SSH环境..."
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          echo "${{ secrets.SSH_PRIVATE_KEY_TIMEFLYSOON }}" > ~/.ssh/id_ed25519_timeflysoon
          echo "${{ secrets.SSH_PRIVATE_KEY_88ALT }}" > ~/.ssh/id_ed25519_88alt
          chmod 600 ~/.ssh/id_ed25519_timeflysoon ~/.ssh/id_ed25519_88alt
          
          cat > ~/.ssh/config << 'EOF'
          Host github-timeflysoon
            HostName github.com
            User git
            IdentityFile ~/.ssh/id_ed25519_timeflysoon
            IdentitiesOnly yes
            StrictHostKeyChecking no
          
          Host github-88alt
            HostName github.com
            User git
            IdentityFile ~/.ssh/id_ed25519_88alt
            IdentitiesOnly yes
            StrictHostKeyChecking no
          EOF
          
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo "✅ SSH配置完成"

      - name: 3. 验证SSH连接
        shell: bash
        run: |
          echo "验证SSH密钥连接..."
          EXIT_CODE=0
          
          echo "测试 timeflysoon 仓库连接..."
          if (ssh -T git@github-timeflysoon 2>&1 || true) | grep -q "timeflysoon"; then
            echo "✅ 密钥 timeflysoon 连接成功"
          else
            echo "❌ 密钥 timeflysoon 连接失败"
            EXIT_CODE=1
          fi
          
          echo "测试 88alt 仓库连接..."
          if (ssh -T git@github-88alt 2>&1 || true) | grep -q "88alt"; then
            echo "✅ 密钥 88alt 连接成功"
          else
            echo "❌ 密钥 88alt 连接失败"
            EXIT_CODE=1
          fi
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ 所有SSH连接验证通过"
          else
            echo "❌ SSH连接验证失败"
            exit 1
          fi

      - name: 4. 配置Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git config --global init.defaultBranch main
          echo "✅ Git配置完成"

      - name: 5. 克隆源仓库
        run: |
          echo "正在克隆源仓库..."
          SOURCE_REPO="https://github.com/MetaCubeX/meta-rules-dat.git"
          CLONE_START=$(date +%s)
          
          MAX_RETRY=3
          for i in $(seq 1 $MAX_RETRY); do
            echo "克隆尝试 $i/$MAX_RETRY..."
            rm -rf meta-rules-dat.git 2>/dev/null || true
            
            if git clone --mirror "$SOURCE_REPO" meta-rules-dat.git; then
              CLONE_END=$(date +%s)
              CLONE_DURATION=$((CLONE_END - CLONE_START))
              echo "✅ 克隆成功，耗时: ${CLONE_DURATION}秒"
              break
            elif [ $i -eq $MAX_RETRY ]; then
              echo "❌ 克隆失败（已达最大重试次数）"
              exit 1
            else
              echo "克隆失败，10秒后重试 ($i/$MAX_RETRY)..."
              sleep 10
            fi
          done
          
          cd meta-rules-dat.git
          echo "应用Git配置规则..."
          git config --unset-all remote.origin.fetch 2>/dev/null || true
          git config --add remote.origin.fetch '+refs/heads/*:refs/heads/*'
          git config --add remote.origin.fetch '+refs/tags/*:refs/tags/*'
          
          # 清理PR引用（单行管道，避免续行符隐患）
          git for-each-ref --format='delete %(refname)' refs/pull 2>/dev/null | git update-ref --stdin 2>/dev/null || echo "无本地PR引用可清理"
          
          echo "仓库信息:"
          echo "  分支: $(git branch -r | wc -l)"
          echo "  标签: $(git tag | wc -l)"
          echo "  大小: $(du -sh . | cut -f1)"
          cd ..

      - name: 6. 执行镜像同步
        id: sync_step
        run: |
          cd meta-rules-dat.git
          echo "=== 开始同步镜像仓库 $(date '+%Y-%m-%d %H:%M:%S') UTC ==="
          
          TARGET_REPOS=(
            "git@github-timeflysoon:timeflysoon/meta-rules-dat.git"
            "git@github-88alt:88alt/meta-rules-dat.git"
          )
          
          SYNC_START_TIME=$(date +%s)
          FAIL_COUNT=0
          
          for TARGET_REPO in "${TARGET_REPOS[@]}"; do
            REPO_HOST=$(echo "$TARGET_REPO" | cut -d'@' -f2 | cut -d':' -f1)
            REPO_PATH=$(echo "$TARGET_REPO" | cut -d':' -f2)
            
            echo "=== 推送镜像到: $REPO_HOST/$REPO_PATH ==="
            REPO_START_TIME=$(date +%s)
            PUSH_SUCCESS=false
            
            MAX_RETRY=2
            for i in $(seq 1 $MAX_RETRY); do
              echo "推送尝试 $i/$MAX_RETRY..."
              if timeout 300 git push --mirror "$TARGET_REPO"; then
                REPO_END_TIME=$(date +%s)
                REPO_DURATION=$((REPO_END_TIME - REPO_START_TIME))
                echo "✅ 推送成功"
                echo "  耗时: ${REPO_DURATION}秒"
                PUSH_SUCCESS=true
                break
              elif [ $i -eq $MAX_RETRY ]; then
                echo "❌ 推送失败（已达最大重试次数）"
              else
                echo "推送失败，10秒后重试 ($i/$MAX_RETRY)..."
                sleep 10
              fi
            done
            
            if [ "$PUSH_SUCCESS" = false ]; then
              FAIL_COUNT=$((FAIL_COUNT + 1))
              echo "⚠️ 标记此仓库同步失败"
            fi
          done
          
          SYNC_END_TIME=$(date +%s)
          TOTAL_DURATION=$((SYNC_END_TIME - SYNC_START_TIME))
          echo "=== 同步完成，总耗时: ${TOTAL_DURATION}秒 ==="
          
          if [ $FAIL_COUNT -gt 0 ]; then
            exit 1
          else
            echo "✅ 所有仓库同步成功"
          fi

      - name: 7. 清理敏感数据
        if: always()
        run: |
          echo "清理SSH密钥文件..."
          rm -f ~/.ssh/id_ed25519_timeflysoon
          rm -f ~/.ssh/id_ed25519_88alt
          rm -f ~/.ssh/config
          rm -f ~/.ssh/known_hosts
          echo "✅ 敏感数据清理完成"

      - name: 8. 生成运行报告
        if: always()
        run: |
          echo "## 🚀 镜像同步任务报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**运行信息**:" >> $GITHUB_STEP_SUMMARY
          echo "- 触发方式: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 运行状态: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- 源仓库: MetaCubeX/meta-rules-dat" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          SYNC_OUTCOME="${{ steps.sync_step.outcome }}"
          if [[ "$SYNC_OUTCOME" == "success" ]]; then
            echo "✅ **执行结果**: 同步成功" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **执行结果**: 同步失败" >> $GITHUB_STEP_SUMMARY
          fi
