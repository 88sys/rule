name: 自动转换 list → mrs (release 目录)

on:
  push:
    branches: [ main ]
    paths:
      - 'release/*.list'
  workflow_dispatch:
    inputs:
      force:
        description: '强制转换所有文件（忽略变更检测）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 【关键修复】恢复 Git 仓库中文件的真实修改时间戳
      - name: 恢复文件的 Git 原始修改时间戳
        uses: chetan/git-restore-mtime-action@v2

      # 下载 Clash Meta 内核
      - name: 下载 Clash Meta 内核
        run: |
          URL="https://github.com/MetaCubeX/mihomo/releases/download/v1.19.17/mihomo-linux-amd64-v1.19.17.gz"
          wget -q "$URL" || wget -q "https://github.com/MetaCubeX/mihomo/releases/download/v1.19.17/mihomo-linux-amd64-compatible-v1.19.17.gz"
          FILENAME=$(ls *.gz)
          gzip -d "$FILENAME"
          chmod +x "${FILENAME%.gz}"
          mv "${FILENAME%.gz}" clash_meta

      # 核心转换逻辑
      - name: 转换所有 .list → .mrs
        run: |
          echo "开始扫描 release/ 目录下的 .list 文件..."
          UPDATED=false
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          for list_file in release/*.list; do
            if [ ! -f "$list_file" ]; then
              echo "未找到任何 .list 文件，跳过。"
              exit 0
            fi

            base_name=$(basename "$list_file" .list)
            mrs_file="release/${base_name}.mrs"

            echo "检查: $list_file → $mrs_file"

            # 转换条件：强制模式 或 .mrs不存在 或 .list 比 .mrs 新
            if [[ "${{ github.event.inputs.force }}" == "true" ]] || \
               [ ! -f "$mrs_file" ] || \
               [ "$list_file" -nt "$mrs_file" ]; then
              
              echo "→ 执行转换: $list_file"
              ./clash_meta convert-ruleset domain text "$list_file" "$mrs_file"
              
              if [ $? -eq 0 ]; then
                echo "✓ 转换成功: $mrs_file"
                UPDATED=true
                touch "$mrs_file"   # 确保 mrs 文件时间戳更新为现在
              else
                echo "✗ 转换失败: $list_file"
              fi
            else
              echo "○ 文件无变化，跳过转换"
            fi
          done

          echo "UPDATED=$UPDATED" >> $GITHUB_ENV
          echo "LAST_RUN=$TIMESTAMP" >> $GITHUB_ENV

      # 智能提交
      - name: 智能提交变更
        if: env.UPDATED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add release/*.mrs
          
          if git diff --cached --quiet; then
            echo "文件时间戳有变化但内容无实质差异，跳过提交。"
            exit 0
          fi

          git commit -m "chore: auto update ruleset(s) ${LAST_RUN} [skip ci]"
          git push origin main
          echo "✅ 规则文件已更新并推送"
